services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=morse_db
      - POSTGRES_USER=morse_user
      - POSTGRES_PASSWORD=morse_password
    ports:
      - "5432:5432"

  web:
    build: .
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgres://morse_user:morse_password@db:5432/morse_db
    depends_on:
      - db

volumes:
  postgres_data:
