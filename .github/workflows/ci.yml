name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

env:
  UV_FROZEN: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .
        env:
          SECRET_KEY: ci-only-secret-key
          DATABASE_URL: postgres://morse:morse@localhost:5432/morse

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: morse
          POSTGRES_PASSWORD: morse
          POSTGRES_DB: morse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U morse -d morse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SECRET_KEY: ci-only-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://morse:morse@localhost:5432/morse
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Django system checks
        run: uv run python manage.py check

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests (cobertura mínima de 80%)
        run: uv run pytest --cov --cov-report=term-missing:skip-covered --cov-fail-under=80

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      # Audita o lockfile completo (produção + dev) contra o banco de
      # vulnerabilidades do PyPA (CVEs / GitHub Security Advisories).
      - name: pip-audit (dependency vulnerability scan)
        run: |
          uv export --no-emit-project --format requirements-txt -o requirements-audit.txt
          uv run pip-audit --disable-pip -r requirements-audit.txt

      # Lint de segurança (flake8-bandit via ruff) já roda no job de lint
      # com a regra "S" habilitada; aqui fica só o scan de dependências.

  docker-build:
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Em PR a imagem é apenas construída (validação); em push nas branches
      # principais ela também é publicada no GitHub Container Registry.
      - name: Login no GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (e push em branch principal)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Dispara o deploy no Render somente depois de lint → testes → security →
  # docker build passarem. Requer desligar o auto-deploy por push no painel do
  # Render e cadastrar o deploy hook como secret RENDER_DEPLOY_HOOK_URL; sem o
  # secret, o job apenas avisa e conclui (o auto-deploy do Render assume).
  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Secret RENDER_DEPLOY_HOOK_URL ausente — pulando o trigger (auto-deploy do Render assume)."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL" -o /dev/null
          echo "Deploy hook do Render disparado."
