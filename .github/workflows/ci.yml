name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

env:
  UV_FROZEN: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .
        env:
          SECRET_KEY: ci-only-secret-key
          DATABASE_URL: postgres://morse:morse@localhost:5432/morse

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: morse
          POSTGRES_PASSWORD: morse
          POSTGRES_DB: morse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U morse -d morse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SECRET_KEY: ci-only-secret-key
      DEBUG: "True"
      DATABASE_URL: postgres://morse:morse@localhost:5432/morse
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Django system checks
        run: uv run python manage.py check

      - name: Check for missing migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: uv run pytest

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      # Audita o lockfile completo (produção + dev) contra o banco de
      # vulnerabilidades do PyPA (CVEs / GitHub Security Advisories).
      - name: pip-audit (dependency vulnerability scan)
        run: |
          uv export --no-emit-project --format requirements-txt -o requirements-audit.txt
          uv run pip-audit --disable-pip -r requirements-audit.txt

      # Lint de segurança (flake8-bandit via ruff) já roda no job de lint
      # com a regra "S" habilitada; aqui fica só o scan de dependências.
